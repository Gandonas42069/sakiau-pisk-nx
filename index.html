<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Error</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    color: #202124;
  }

  .container {
    max-width: 600px;
    margin: 120px auto;
    padding: 0 20px;
  }

  .code {
    font-size: 22px;
    color: #d93025;
    margin-bottom: 10px;
  }

  .title {
    font-size: 18px;
    margin-bottom: 10px;
  }

  .text {
    font-size: 14px;
    color: #5f6368;
    line-height: 1.5;
  }
</style>
</head>

<body>
  <div class="container">
    <div class="code">Error</div>
    <div class="title">This page isn’t working</div>
    <div class="text">
      The server returned an unexpected response. Please try again later.
    </div>
  </div>
</body>
</html>
