<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>System Error</title>
<style>
body {
  margin: 0;
  background: #0b0f14;
  color: #c9d1d9;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.box {
  text-align: left;
  border: 1px solid #30363d;
  padding: 20px;
  width: 420px;
}
.error {
  color: #ff4d4d;
  font-weight: bold;
  margin-bottom: 10px;
}
</style>
</head>
<body>
  <div class="box">
    <div class="error">[ERROR]</div>
    <div>System request failed</div>
    <div>Operation terminated</div>
  </div>
</body>
</html>
